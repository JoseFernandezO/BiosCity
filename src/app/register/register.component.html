<ion-content class="register-content">
  <div class="center-container">
    <div class="register-card">
      <div class="register-header">
        <h2>¡Únete a nosotros!</h2>
        <h1>Crea tu cuenta</h1>
      </div>

      <form (ngSubmit)="register()">
        <ion-item>
          <ion-label position="floating">Correo electrónico</ion-label>
          <ion-input type="email" [(ngModel)]="user.email" name="email" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña</ion-label>
          <ion-input type="password" [(ngModel)]="user.password" name="password" required></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" class="register-btn">
          REGISTRARSE
        </ion-button>

        <div class="footer-links">
          <a (click)="goToLogin()">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
      </form>
    </div>
  </div>
</ion-content>
